{{- if and .Values.features.gatewayApi.enabled .Values.features.gatewayApi.sharedGateway.enabled }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.environmentConfig.bootstrap.resourcePrefix }}-wildcard
  namespace: kube-system
  annotations:
    argocd.argoproj.io/sync-wave: "17"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  secretName: {{ .Values.environmentConfig.bootstrap.resourcePrefix }}-wildcard-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - "*.{{ .Values.environmentConfig.bootstrap.clusterFqdn }}"
    - "{{ .Values.environmentConfig.bootstrap.clusterFqdn }}"
{{- range $i, $fqdn := .Values.environmentConfig.bootstrap.additionalClusterFqdns }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ $.Values.environmentConfig.bootstrap.resourcePrefix }}-wildcard-{{ $i }}
  namespace: kube-system
  annotations:
    argocd.argoproj.io/sync-wave: "17"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  secretName: {{ $.Values.environmentConfig.bootstrap.resourcePrefix }}-wildcard-{{ $i }}-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - "*.{{ $fqdn }}"
    - "{{ $fqdn }}"
{{- end }}
{{- end }}
