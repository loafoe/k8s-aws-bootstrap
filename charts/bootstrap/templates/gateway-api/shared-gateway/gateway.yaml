{{- if and .Values.features.gatewayApi.enabled .Values.features.gatewayApi.sharedGateway.enabled (not .Values.features.shutdown.enabled) }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: platform
  namespace: kube-system
  annotations:
    argocd.argoproj.io/sync-wave: "18"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  gatewayClassName: cilium
  infrastructure:
    annotations:
      service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
      service.beta.kubernetes.io/aws-load-balancer-type: nlb
      service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
      service.beta.kubernetes.io/aws-load-balancer-alpn-policy: HTTP2Preferred
      service.beta.kubernetes.io/aws-load-balancer-name: {{ printf "%s-gateway" .Values.environmentConfig.bootstrap.resourcePrefix }}
      # Note: Dualstack NLB with instance target groups requires Cilium to bind
      # NodePort to global IPv6 addresses, which is not currently supported.
      # Using IPv4-only NLB until Cilium adds support.
      # {{- if .Values.environmentConfig.bootstrap.enableDualStack }}
      # service.beta.kubernetes.io/aws-load-balancer-ip-address-type: dualstack
      # {{- end }}
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "*.{{ .Values.environmentConfig.bootstrap.clusterFqdn }}"
      allowedRoutes:
        namespaces:
          from: All
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: {{ .Values.environmentConfig.bootstrap.resourcePrefix }}-wildcard-tls
            namespace: kube-system
    {{- if and .Values.features.spiffe.enabled .Values.features.spiffe.federation.enabled }}
    - name: tls-spiffe
      protocol: TLS
      port: 443
      hostname: "spiffe.{{ .Values.environmentConfig.bootstrap.clusterFqdn }}"
      allowedRoutes:
        namespaces:
          from: All
        kinds:
          - kind: TLSRoute
      tls:
        mode: Passthrough
    {{- end }}
{{- end }}
