apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: crossplane-functions
  namespace: argocd
  annotations:
    # Wave 3: after the crossplane Application (wave 2) so the Function CRD and
    # core (which signs each function's TLS cert from the shared CA) are ready.
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: oci://ghcr.io/philips-software/helm-charts/crossplane-functions
    # renovate: datasource=docker depName=ghcr.io/philips-software/helm-charts/crossplane-functions
    targetRevision: 0.0.14
    path: .
    helm:
      valuesObject:
        resources:
          limits:
            memory: 64Mi
          requests:
            cpu: 5m
            memory: 24Mi
        extraFunctions: []
  destination:
    server: https://kubernetes.default.svc
    namespace: crossplane-system
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - HealthCheckTimeout=10m
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 3
