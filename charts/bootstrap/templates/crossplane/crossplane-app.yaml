apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: crossplane
  namespace: argocd
  annotations:
    # Wave 2 (after cert-manager + crossplane-pki at wave 1) so the cert-manager
    # managed CA is present in the crossplane-root-ca secret before `core init`
    # runs. core reuses that CA to sign all server/client/package certs, keeping
    # crossplane core and the composition functions on a single, stable CA.
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/manifest-generate-paths: /charts/crossplane
spec:
  project: default
  source:
    repoURL: https://github.com/loafoe/k8s-aws-bootstrap
    path: charts/crossplane
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: crossplane-system
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - HealthCheckTimeout=10m
  revisionHistoryLimit: 3
