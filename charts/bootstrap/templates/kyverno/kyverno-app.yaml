apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  destination:
    namespace: kyverno
    server: https://kubernetes.default.svc
  project: default
  source:
    chart: kyverno
    repoURL: https://kyverno.github.io/kyverno
    # renovate: datasource=helm registryUrl=https://kyverno.github.io/kyverno depName=kyverno
    targetRevision: 3.8.0
    helm:
      valuesObject:
        # Global feature flags
        features:
          # CRITICAL: When Kyverno is unreachable, allow pod creation to proceed
          # without mutations rather than blocking all pod creation cluster-wide.
          # Trades brief policy enforcement gaps for cluster availability.
          forceFailurePolicyIgnore:
            enabled: true
        config:
          preserve: false
          # Exclude karpenter namespace from Kyverno admission control to prevent
          # deadlock: if Kyverno is down and needs a new node, Karpenter must be
          # able to start without being blocked by Kyverno's admission webhook
          webhooks:
            namespaceSelector:
              matchExpressions:
              - key: kubernetes.io/metadata.name
                operator: NotIn
                values:
                - kube-system
                - karpenter
        admissionController:
          rbac:
            clusterRole:
              extraResources:
                - apiGroups:
                    - gateway.networking.k8s.io
                  resources:
                    - httproutes
                    - grpcroutes
                    - tlsroutes
                  verbs:
                    - list
                    - get
          replicas: 3
          # Run admission controller on system nodes (critical component)
          nodeSelector:
            node-type: system
          tolerations:
          - key: CriticalAddonsOnly
            operator: Exists
          # Distribute admission controller pods across zones AND nodes for high availability
          # Using ScheduleAnyway (soft) ensures pods still get placed if ideal spread isn't possible
          topologySpreadConstraints:
          - maxSkew: 1
            topologyKey: topology.kubernetes.io/zone
            whenUnsatisfiable: ScheduleAnyway
            labelSelector:
              matchLabels:
                app.kubernetes.io/component: admission-controller
          - maxSkew: 1
            topologyKey: kubernetes.io/hostname
            whenUnsatisfiable: ScheduleAnyway
            labelSelector:
              matchLabels:
                app.kubernetes.io/component: admission-controller
          # Allow node drains while maintaining availability
          podDisruptionBudget:
            minAvailable: ""
            maxUnavailable: 1
          container:
            resources:
              limits:
                memory: 256Mi
              requests:
                cpu: 5m
                memory: 128Mi
        backgroundController:
          replicas: 2
          # Run background controller on system nodes (critical component)
          nodeSelector:
            node-type: system
          tolerations:
          - key: CriticalAddonsOnly
            operator: Exists
          # Distribute across zones and nodes with soft constraints
          topologySpreadConstraints:
          - maxSkew: 1
            topologyKey: topology.kubernetes.io/zone
            whenUnsatisfiable: ScheduleAnyway
            labelSelector:
              matchLabels:
                app.kubernetes.io/component: background-controller
          - maxSkew: 1
            topologyKey: kubernetes.io/hostname
            whenUnsatisfiable: ScheduleAnyway
            labelSelector:
              matchLabels:
                app.kubernetes.io/component: background-controller
          # Allow node drains
          podDisruptionBudget:
            minAvailable: ""
            maxUnavailable: 1
          resources:
            limits:
              memory: 256Mi
            requests:
              cpu: 5m
              memory: 64Mi
        cleanupController:
          replicas: 2
          # Run cleanup controller on system nodes (critical component)
          nodeSelector:
            node-type: system
          tolerations:
          - key: CriticalAddonsOnly
            operator: Exists
          # Distribute across zones and nodes with soft constraints
          topologySpreadConstraints:
          - maxSkew: 1
            topologyKey: topology.kubernetes.io/zone
            whenUnsatisfiable: ScheduleAnyway
            labelSelector:
              matchLabels:
                app.kubernetes.io/component: cleanup-controller
          - maxSkew: 1
            topologyKey: kubernetes.io/hostname
            whenUnsatisfiable: ScheduleAnyway
            labelSelector:
              matchLabels:
                app.kubernetes.io/component: cleanup-controller
          # Allow node drains
          podDisruptionBudget:
            minAvailable: ""
            maxUnavailable: 1
          resources:
            limits:
              memory: 128Mi
            requests:
              cpu: 5m
              memory: 32Mi
        reportsController:
          replicas: 2
          # Run reports controller on system nodes (critical component)
          nodeSelector:
            node-type: system
          tolerations:
          - key: CriticalAddonsOnly
            operator: Exists
          # Distribute across zones and nodes with soft constraints
          topologySpreadConstraints:
          - maxSkew: 1
            topologyKey: topology.kubernetes.io/zone
            whenUnsatisfiable: ScheduleAnyway
            labelSelector:
              matchLabels:
                app.kubernetes.io/component: reports-controller
          - maxSkew: 1
            topologyKey: kubernetes.io/hostname
            whenUnsatisfiable: ScheduleAnyway
            labelSelector:
              matchLabels:
                app.kubernetes.io/component: reports-controller
          # Allow node drains
          podDisruptionBudget:
            minAvailable: ""
            maxUnavailable: 1
          resources:
            limits:
              memory: 256Mi
            requests:
              cpu: 5m
              memory: 64Mi
        # CRD migration and webhook cleanup jobs
        crds:
          migration:
            nodeSelector:
              node-type: system
            tolerations:
            - key: CriticalAddonsOnly
              operator: Exists
            podResources:
              limits:
                memory: 256Mi
              requests:
                cpu: 5m
                memory: 64Mi
        webhooksCleanup:
          nodeSelector:
            node-type: system
          tolerations:
          - key: CriticalAddonsOnly
            operator: Exists
          resources:
            limits:
              memory: 128Mi
            requests:
              cpu: 5m
              memory: 32Mi
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        - /metadata/annotations
        - /metadata/labels
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - HealthCheckTimeout=10m
  revisionHistoryLimit: 3
