{{- if .Values.features.spiffe.enabled }}
{{- $trustDomain := .Values.features.spiffe.trustDomain | default .Values.environmentConfig.bootstrap.clusterFqdn }}
{{- $jwtIssuer := printf "https://oidc-discovery.%s" .Values.environmentConfig.bootstrap.clusterFqdn }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: spire
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "13"
    argocd.argoproj.io/manifest-generate-paths: /charts/spire
spec:
  project: default
  source:
    repoURL: https://github.com/loafoe/k8s-aws-bootstrap
    path: charts/spire
    targetRevision: HEAD
    helm:
      valuesObject:
        spire:
          global:
            spire:
              trustDomain: {{ $trustDomain }}
              jwtIssuer: {{ $jwtIssuer }}
          {{- if .Values.features.spiffe.federation.enabled }}
          spire-server:
            federation:
              enabled: true
              bundleEndpoint:
                port: 8443
                address: "0.0.0.0"
              tls:
                spire:
                  enabled: false
                certManager:
                  enabled: false
                externalSecret:
                  enabled: true
                  secretName: spire-federation-tls
          {{- end }}
          spiffe-oidc-discovery-provider:
            {{- if .Values.features.spiffe.oidcDiscovery.enabled }}
            enabled: true
            resources:
              requests:
                cpu: 25m
                memory: 32Mi
              limits:
                memory: 64Mi
            config:
              domains:
                - oidc-discovery.{{ .Values.environmentConfig.bootstrap.clusterFqdn }}
            tls:
              spire:
                enabled: false
              certManager:
                enabled: false
            {{- else }}
            enabled: false
            {{- end }}
  destination:
    server: https://kubernetes.default.svc
    namespace: spire-system
  ignoreDifferences:
    - group: apps
      jsonPointers:
        - /spec/replicas
      kind: Deployment
    - group: apps
      jsonPointers:
        - /spec/replicas
        - /spec/volumeClaimTemplates/0/apiVersion
        - /spec/volumeClaimTemplates/0/kind
        - /spec/volumeClaimTemplates/0/status
      kind: StatefulSet
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - HealthCheckTimeout=10m
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 3
{{- end }}
