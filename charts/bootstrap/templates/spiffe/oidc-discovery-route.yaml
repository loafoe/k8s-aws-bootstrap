{{- if and .Values.features.spiffe.enabled .Values.features.spiffe.oidcDiscovery.enabled .Values.features.gatewayApi.enabled .Values.features.gatewayApi.sharedGateway.enabled (not .Values.features.shutdown.enabled) }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: spiffe-oidc-discovery
  namespace: spire-system
  annotations:
    argocd.argoproj.io/sync-wave: "19"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  parentRefs:
    - name: platform
      namespace: kube-system
  hostnames:
    - oidc-discovery.{{ .Values.environmentConfig.bootstrap.clusterFqdn }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: spire-spiffe-oidc-discovery-provider
          port: 80
{{- end }}
