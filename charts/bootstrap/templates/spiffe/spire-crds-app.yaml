{{- if .Values.features.spiffe.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: spire-crds
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "12"
    argocd.argoproj.io/manifest-generate-paths: /charts/spire-crds
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/loafoe/k8s-aws-bootstrap
    path: charts/spire-crds
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: spire-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - Replace=true
      - HealthCheckTimeout=10m
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 3
{{- end }}
