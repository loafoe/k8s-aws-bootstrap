{{- if .Values.features.spiffe.enabled }}
{{- if .Values.features.spiffe.federations }}
{{- range .Values.features.spiffe.federations }}
---
apiVersion: spire.spiffe.io/v1alpha1
kind: ClusterFederatedTrustDomain
metadata:
  name: {{ .name }}
  annotations:
    argocd.argoproj.io/sync-wave: "14"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  className: spire-system-spire
  trustDomain: {{ .trustDomain }}
  bundleEndpointURL: {{ .bundleEndpointURL }}
  bundleEndpointProfile:
    type: {{ .bundleEndpointProfile | default "https_web" }}
{{- end }}
{{- end }}
{{- end }}
