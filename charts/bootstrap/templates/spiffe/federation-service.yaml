{{- if and .Values.features.spiffe.enabled .Values.features.spiffe.federation.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: spire-federation
  namespace: spire-system
  annotations:
    argocd.argoproj.io/sync-wave: "14"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    external-dns.alpha.kubernetes.io/hostname: spiffe.{{ .Values.environmentConfig.bootstrap.clusterFqdn }}
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
    service.beta.kubernetes.io/aws-load-balancer-type: nlb
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: ip
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: spire-server
    app.kubernetes.io/instance: spire
  ports:
    - name: federation
      port: 443
      targetPort: 8443
      protocol: TCP
{{- end }}
