apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium-crds
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  source:
    repoURL: https://helm.cilium.io/
    chart: cilium
    # renovate: datasource=helm registryUrl=https://helm.cilium.io depName=cilium
    targetRevision: 1.19.1
    helm:
      valuesObject:
        # Only install CRDs, disable everything else
        agent: false
        operator:
          enabled: false
        hubble:
          enabled: false
        cni:
          install: false
        preflight:
          enabled: false
        nodeinit:
          enabled: false
        clustermesh:
          useAPIServer: false
        envoy:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 3
