apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    argocd.argoproj.io/manifest-generate-paths: /charts/cilium
spec:
  project: default
  source:
    repoURL: https://github.com/loafoe/k8s-aws-bootstrap
    path: charts/cilium
    targetRevision: HEAD
    helm:
      valuesObject:
        cilium:
          # IPAM Configuration
          ipam:
            {{- if .Values.environmentConfig.bootstrap.enableDualStack }}
            mode: cluster-pool
            operator:
              clusterPoolIPv4PodCIDRList:
                - "{{ .Values.environmentConfig.bootstrap.ipv4ClusterCIDR }}"
              clusterPoolIPv4MaskSize: 24
              clusterPoolIPv6PodCIDRList:
                - "{{ .Values.environmentConfig.bootstrap.ipv6ClusterCIDR }}"
              clusterPoolIPv6MaskSize: 64
            {{- else }}
            mode: kubernetes
            operator:
              clusterPoolIPv4PodCIDRList:
                - "{{ .Values.environmentConfig.bootstrap.ipv4ClusterCIDR }}"
            {{- end }}

          # API Server Configuration
          k8sServiceHost: "{{ .Values.environmentConfig.bootstrap.clusterHost }}"

          # IPv4/IPv6 Configuration
          {{- if .Values.environmentConfig.bootstrap.enableDualStack }}
          ipv4:
            enabled: true
          ipv6:
            enabled: true
          enableIPv4Masquerade: true
          enableIPv6Masquerade: true
          {{- else }}
          ipv4:
            enabled: true
          ipv6:
            enabled: false
          enableIPv4Masquerade: true
          {{- end }}

  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: cilium-ca
      namespace: kube-system
      jsonPointers:
        - /data
    - group: ""
      kind: Secret
      name: hubble-relay-client-certs
      namespace: kube-system
      jsonPointers:
        - /data
    - group: ""
      kind: Secret
      name: hubble-server-certs
      namespace: kube-system
      jsonPointers:
        - /data
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
      - HealthCheckTimeout=10m
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 3
