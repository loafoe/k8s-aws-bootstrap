apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: karpenter
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/manifest-generate-paths: /charts/karpenter
spec:
  project: default
  source:
    repoURL: https://github.com/loafoe/k8s-aws-bootstrap
    path: charts/karpenter
    targetRevision: HEAD
    helm:
      valuesObject:
        karpenter:
          settings:
            clusterName: {{ .Values.environmentConfig.bootstrap.clusterName }}
            clusterEndpoint: {{ .Values.environmentConfig.bootstrap.clusterEndpoint }}
            aws:
              defaultInstanceProfile: {{ .Values.environmentConfig.bootstrap.karpenterInstanceProfile }}
              region: {{ .Values.environmentConfig.bootstrap.awsRegion }}
              vpcId: {{ .Values.environmentConfig.bootstrap.awsVpcId }}
              subnetSelector:
                karpenter.sh/discovery/{{ .Values.environmentConfig.bootstrap.clusterName }}: "{{ .Values.environmentConfig.bootstrap.clusterName }}"
              securityGroupSelector:
                karpenter.sh/discovery/{{ .Values.environmentConfig.bootstrap.clusterName }}: "{{ .Values.environmentConfig.bootstrap.clusterName }}"
          serviceAccount:
            annotations:
              eks.amazonaws.com/role-arn: {{ .Values.environmentConfig.bootstrap.karpenterRoleArn }}
  destination:
    server: https://kubernetes.default.svc
    namespace: karpenter
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - HealthCheckTimeout=10m
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 3
