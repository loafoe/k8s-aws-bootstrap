apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  acme:
    email: no-reply@loafoe.com
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      # Secret resource that will be used to store the account's private key.
      name: letsencrypt-prod
    # Add a single challenge solver, DNS01 using Route53
    solvers:
    - dns01:
        route53:
          # cert-manager v1.20+ uses aws-sdk-go-v2, which requires an explicit
          # region — Pod Identity injects credentials but not AWS_REGION, so
          # without this the Route53 solver fails with "Missing Region".
          region: {{ .Values.environmentConfig.bootstrap.awsRegion }}
