{{- if and .Values.features.hspAwsPlatform.enabled .Values.features.hspAwsPlatform.vpa }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vertical-pod-autoscaler
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "21"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://kubernetes.github.io/autoscaler
    # renovate: datasource=helm registryUrl=https://kubernetes.github.io/autoscaler depName=vertical-pod-autoscaler
    targetRevision: 0.8.1
    chart: vertical-pod-autoscaler
    helm:
      valuesObject:
        # Admission controller configuration
        admissionController:
          enabled: true
          replicas: 1
          resources:
            requests:
              cpu: 5m
              memory: 32Mi
            limits:
              memory: 64Mi
          podDisruptionBudget:
            enabled: false

        # Recommender configuration
        recommender:
          enabled: true
          replicas: 1
          resources:
            requests:
              cpu: 5m
              memory: 64Mi
            limits:
              memory: 128Mi
          podDisruptionBudget:
            enabled: false

        # Updater configuration
        updater:
          enabled: true
          replicas: 1
          resources:
            requests:
              cpu: 5m
              memory: 64Mi
            limits:
              memory: 128Mi
          podDisruptionBudget:
            enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: vpa-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - HealthCheckTimeout=10m
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
{{- end }}
