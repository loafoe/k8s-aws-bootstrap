apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "16"
    argocd.argoproj.io/manifest-generate-paths: /charts/kube-prometheus-stack
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/loafoe/k8s-aws-bootstrap
    path: charts/kube-prometheus-stack
    targetRevision: HEAD
    helm:
      releaseName: kps
      valuesObject:
        kube-prometheus-stack:
          grafana:
            enabled: {{ .Values.features.kubePrometheusStack.grafana.enabled }}
  destination:
    server: https://kubernetes.default.svc
    namespace: prometheus
  ignoreDifferences:
    - group: monitoring.coreos.com
      kind: ServiceMonitor
      jqPathExpressions:
        - .spec.endpoints[]?.relabelings[]?.action
        - .spec.endpoints[]?.metricRelabelings[]?.action
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - HealthCheckTimeout=10m
  revisionHistoryLimit: 3
