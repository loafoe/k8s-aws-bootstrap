apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "19"
    argocd.argoproj.io/manifest-generate-paths: /charts/external-secrets
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/loafoe/k8s-aws-bootstrap
    path: charts/external-secrets
    targetRevision: HEAD
    helm:
      valuesObject:
        external-secrets:
          serviceAccount:
            annotations:
              eks.amazonaws.com/role-arn: arn:{{ .Values.environmentConfig.bootstrap.awsPartition }}:iam::{{ .Values.environmentConfig.bootstrap.awsAccountId }}:role/{{ .Values.environmentConfig.bootstrap.resourcePrefix }}-eso
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  ignoreDifferences:
    - group: apps
      jsonPointers:
        - /spec/replicas
      kind: Deployment
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - HealthCheckTimeout=10m
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 3
