apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aws-load-balancer-controller
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "6"
    argocd.argoproj.io/manifest-generate-paths: /charts/aws-load-balancer-controller
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/loafoe/k8s-aws-bootstrap
    path: charts/aws-load-balancer-controller
    targetRevision: HEAD
    helm:
      valuesObject:
        aws-load-balancer-controller:
          clusterName: {{ .Values.environmentConfig.bootstrap.clusterName }}
          region: {{ .Values.environmentConfig.bootstrap.awsRegion }}
          vpcId: {{ .Values.environmentConfig.bootstrap.awsVpcId }}
          serviceAccount:
            annotations:
              eks.amazonaws.com/role-arn: {{ .Values.environmentConfig.bootstrap.awsLbcRoleArn }}  
  destination:
    server: https://kubernetes.default.svc
    namespace: aws-load-balancer-controller
  ignoreDifferences:
    - group: apps
      jsonPointers:
        - /spec/replicas
      kind: Deployment
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - HealthCheckTimeout=10m
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 3
