apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-dns
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "6"
    argocd.argoproj.io/manifest-generate-paths: /charts/external-dns
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/loafoe/k8s-aws-bootstrap
    path: charts/external-dns
    targetRevision: HEAD
    helm:
      valuesObject:
        external-dns:
          serviceAccount:
            annotations:
              eks.amazonaws.com/role-arn: {{ .Values.environmentConfig.bootstrap.awsExternalDnsRoleArn }}
          domainFilters:
            - {{ .Values.environmentConfig.bootstrap.clusterFqdn }}
            {{- range .Values.environmentConfig.bootstrap.additionalClusterFqdns }}
            - {{ . }}
            {{- end }}
  destination:
    server: https://kubernetes.default.svc
    namespace: external-dns
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - HealthCheckTimeout=10m
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 3
