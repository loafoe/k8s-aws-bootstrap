apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aws-ebs-csi-driver
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "7"
    argocd.argoproj.io/manifest-generate-paths: /charts/aws-ebs-csi-driver
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/loafoe/k8s-aws-bootstrap
    path: charts/aws-ebs-csi-driver
    targetRevision: HEAD
    helm:
      valuesObject:
        aws-ebs-csi-driver:
          controller:
            serviceAccount:
              annotations:
                eks.amazonaws.com/role-arn: {{ .Values.environmentConfig.bootstrap.awsEbsCsiDriverRoleArn }}
  destination:
    server: https://kubernetes.default.svc
    namespace: aws-ebs-csi-driver
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - HealthCheckTimeout=10m
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 3
