apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: amazon-eks-pod-identity-webhook
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/manifest-generate-paths: /charts/amazon-eks-pod-identity-webhook
spec:
  project: default
  source:
    repoURL: https://github.com/loafoe/k8s-aws-bootstrap
    path: charts/amazon-eks-pod-identity-webhook
    targetRevision: HEAD
    helm:
      valuesObject:
        amazon-eks-pod-identity-webhook:
          config:
            defaultAwsRegion: {{ .Values.environmentConfig.bootstrap.awsRegion }}
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  ignoreDifferences:
    - group: apps
      jsonPointers:
        - /spec/replicas
      kind: Deployment
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - HealthCheckTimeout=5m
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 3
