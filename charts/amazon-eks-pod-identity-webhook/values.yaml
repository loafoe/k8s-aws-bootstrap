amazon-eks-pod-identity-webhook:
  replicaCount: 1

  tolerations:
  - key: CriticalAddonsOnly
    operator: Exists

  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: node-type
            operator: In
            values:
            - system
            - control-plane

  resources:
    limits:
      memory: 32Mi
    requests:
      cpu: 10m
      memory: 20Mi

  config:
    stsRegionalEndpoint: true
    extraArgs:
      - --service-account-lookup-grace-period=2s

  image:
    registry: public.ecr.aws
    repository: eks/amazon-eks-pod-identity-webhook

  pki:
    certManager:
      enabled: true
