external-secrets:
  fullnameOverride: eso

  installCRDs: true

  serviceAccount:
    create: true
    name: external-secrets

  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      memory: 128Mi

  webhook:
    resources:
      requests:
        cpu: 5m
        memory: 32Mi
      limits:
        memory: 64Mi

  certController:
    resources:
      requests:
        cpu: 5m
        memory: 64Mi
      limits:
        memory: 128Mi
