cilium:
  # Networking Configuration
  tunnelProtocol: vxlan
  autoDirectNodeRoutes: false
  routingMode: tunnel
  kubeProxyReplacement: true

  # Bandwidth Manager - improves TCP performance for high-throughput workloads
  bandwidthManager:
    enabled: true
    bbr: true  # BBR congestion control for better throughput

  # API Server Configuration
  k8sServicePort: "6443"

  # Socket-level Load Balancing
  socketLB:
    enabled: true
    hostNamespaceOnly: false
    # Terminate cached connections when backend pods are removed - prevents stale
    # connection errors ("operation not permitted") after pod restarts/rollouts
    terminatePodConnections: true

  # BPF Configuration
  bpf:
    masquerade: true
    tproxy: true
    lbExternalClusterIP: true

  # Load Balancer Configuration
  loadBalancer:
    algorithm: random
    mode: snat

  # Gateway API Configuration
  gatewayAPI:
    enabled: true
    externalTrafficPolicy: Cluster
    enableAlpn: true
    enableAppProtocol: true

  # Envoy Configuration
  envoy:
    enabled: true
    prometheus:
      enabled: true
      serviceMonitor:
        enabled: true
        labels:
          release: kps
    tolerations:
      - operator: Exists
    resources:
      limits:
        memory: 74Mi
      requests:
        cpu: 20m
        memory: 43Mi

  # Prometheus Metrics
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: true
      labels:
        release: kps
    metrics:
      - "+bpf_syscall_duration_seconds"
      - "+fqdn_active_names"
      - "+fqdn_active_ips"
      - "+fqdn_alive_zombie_connections"
      - "+k8s_event_lag_seconds"
      - "+cidrgroup_translation_time_stats_seconds"
      - "+api_limiter_wait_history_duration_seconds"

  # Hubble Observability Platform
  hubble:
    enabled: true
    relay:
      enabled: true
      replicas: 1
      nodeSelector:
        node-type: system
      tolerations:
        - key: node.kubernetes.io/not-ready
          operator: Exists
        - key: node.kubernetes.io/unreachable
          operator: Exists
        - key: CriticalAddonsOnly
          operator: Exists
      resources:
        limits:
          memory: 40Mi
        requests:
          cpu: 20m
          memory: 32Mi
    ui:
      enabled: true
      replicas: 1
      nodeSelector:
        node-type: system
      tolerations:
        - key: node.kubernetes.io/not-ready
          operator: Exists
        - key: node.kubernetes.io/unreachable
          operator: Exists
        - key: CriticalAddonsOnly
          operator: Exists
      backend:
        resources:
          limits:
            memory: 32Mi
          requests:
            cpu: 10m
            memory: 16Mi
      frontend:
        resources:
          limits:
            memory: 16Mi
          requests:
            cpu: 10m
            memory: 8Mi
    metrics:
      enableOpenMetrics: true
      serviceMonitor:
        enabled: true
        labels:
          release: kps
      enabled:
        - dns:query;ignoreAAAA;destinationContext=pod
        - drop:sourceContext=pod;destinationContext=pod
        - tcp:sourceContext=pod;destinationContext=pod
        - flow:sourceContext=pod;destinationContext=pod
        - icmp:sourceContext=pod;destinationContext=pod
        - httpV2:sourceContext=pod;destinationContext=pod;exemplars=true
        - flows-to-world:destinationContext=pod
        - port-distribution:sourceContext=pod;destinationContext=pod
        - kafka:sourceContext=pod;destinationContext=pod
        - policy:sourceContext=pod;destinationContext=pod
    # Hubble Flow Export — Gateway API / Envoy L7 (HTTP) access logs.
    # Static exporter is bound to the agent lifecycle and rotates natively.
    # The file is tailed off-node by a logs collector (configured separately).
    export:
      static:
        enabled: true
        filePath: /var/run/cilium/hubble/events.log
        # event_type 129 = AccessLog (L7/HTTP) — verified against live Hubble
        # records on dip-ce-k3s-eu. Excludes L3/L4 flow noise.
        allowList:
          - '{"event_type":[{"type":129}]}'
        fileMaxSizeMb: 50
        fileMaxBackups: 5
        fileCompress: true

  # Operator Configuration
  operator:
    prometheus:
      enabled: true
      serviceMonitor:
        enabled: true
        labels:
          release: kps
    replicas: 2
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: node-type
                  operator: In
                  values:
                    - system
                    - control-plane
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              topologyKey: kubernetes.io/hostname
              labelSelector:
                matchLabels:
                  io.cilium/app: operator
    tolerations:
      - key: node.kubernetes.io/not-ready
        operator: Exists
      - key: node.kubernetes.io/unreachable
        operator: Exists
      - key: node.kubernetes.io/disk-pressure
        operator: Exists
      - key: node.kubernetes.io/memory-pressure
        operator: Exists
      - key: node.kubernetes.io/pid-pressure
        operator: Exists
      - key: node.kubernetes.io/unschedulable
        operator: Exists
      - key: CriticalAddonsOnly
        operator: Exists
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
    resources:
      limits:
        memory: 160Mi
      requests:
        cpu: 50m
        memory: 80Mi

  # Agent (DaemonSet) Configuration
  tolerations:
    - operator: Exists
      effect: NoSchedule
    - key: node.kubernetes.io/not-ready
      operator: Exists
    - key: node.kubernetes.io/unreachable
      operator: Exists
    - key: node.kubernetes.io/disk-pressure
      operator: Exists
    - key: node.kubernetes.io/memory-pressure
      operator: Exists
    - key: node.kubernetes.io/pid-pressure
      operator: Exists
    - key: node.kubernetes.io/unschedulable
      operator: Exists
    - key: CriticalAddonsOnly
      operator: Exists
    - key: node.cilium.io/agent-not-ready
      operator: Exists

  resources:
    limits:
      memory: 384Mi
    requests:
      cpu: 100m
      memory: 192Mi

  # Device Configuration
  # Explicitly set devices to ensure all IPv6 addresses are detected for NodePort
  # ens+ for most EC2 instances, enp+ for m7a and other PCI-based naming
  devices: "ens+ enp+"
  directRoutingDevice: ""

  # NodePort Configuration
  # Bind NodePort to all addresses (including global IPv6) for dualstack NLB support
  nodePort:
    enableHealthCheckNodePort: true

  # Encryption Configuration
  # WireGuard transparent encryption for pod-to-pod traffic. nodeEncryption
  # also encrypts host/node-to-node traffic between Cilium-managed nodes; the
  # control-plane node is auto-exempted by Cilium to avoid a key-rotation
  # bootstrap deadlock. WireGuard auto-generates per-node keys (no secrets to
  # manage). In tunnel/vxlan mode traffic is double-encapsulated, but the EC2
  # 9001 (jumbo) MTU leaves ample headroom.
  encryption:
    enabled: true
    type: wireguard
    nodeEncryption: true

  # Policy Configuration
  policyEnforcementMode: default
  identityAllocationMode: crd

  # Disable CiliumEndpointSlice (obsolete)
  ciliumEndpointSlice:
    enabled: false

  # API Rate Limiting - increased for faster endpoint reconciliation
  k8sClientRateLimit:
    qps: 20
    burst: 40
