cert-manager:
  config:
    enableGatewayAPI: true

  crds:
    enabled: true

  serviceAccount:
    create: true
    name: cert-manager

  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: node-type
            operator: In
            values:
            - system
            - control-plane

  tolerations:
  - key: CriticalAddonsOnly
    operator: Exists

  resources:
    requests:
      cpu: 5m
      memory: 25Mi
    limits:
      memory: 80Mi

  cainjector:
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
          - matchExpressions:
            - key: node-type
              operator: In
              values:
              - system
              - control-plane
    tolerations:
    - key: CriticalAddonsOnly
      operator: Exists
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 180Mi

  webhook:
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
          - matchExpressions:
            - key: node-type
              operator: In
              values:
              - system
              - control-plane
    tolerations:
    - key: CriticalAddonsOnly
      operator: Exists
    resources:
      requests:
        cpu: 20m
        memory: 20Mi
      limits:
        memory: 40Mi

  startupapicheck:
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
          - matchExpressions:
            - key: node-type
              operator: In
              values:
              - system
              - control-plane
    tolerations:
    - key: CriticalAddonsOnly
      operator: Exists
    resources:
      requests:
        cpu: 10m
        memory: 20Mi
      limits:
        memory: 40Mi
