name: Update Helm Dependencies

on:
  workflow_run:
    workflows: ["Renovate"]
    types:
      - completed
  workflow_dispatch:

jobs:
  update-deps:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Update chart dependencies on Renovate branches
        env:
          GH_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
        run: |
          branches=$(gh pr list --repo ${{ github.repository }} --state open --json headRefName --jq '.[] | select(.headRefName | startswith("renovate/")) | .headRefName')

          for branch in $branches; do
            echo "=== Checking $branch ==="
            tmp=$(mktemp -d)
            git clone --branch "$branch" --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" "$tmp"
            pushd "$tmp"

            updated=false
            for chart in charts/*/Chart.yaml; do
              [ -f "$chart" ] || continue
              dir=$(dirname "$chart")
              [ -d "$dir/charts" ] || mkdir -p "$dir/charts"

              dep_name=$(awk '/dependencies:/{found=1} found && /name:/{print $NF; exit}' "$chart" | tr -d '"')
              dep_version=$(awk '/dependencies:/{found=1} found && /version:/{print $NF; exit}' "$chart" | tr -d '"')

              if [ -z "$dep_name" ] || [ -z "$dep_version" ]; then
                continue
              fi

              expected="${dir}/charts/${dep_name}-${dep_version}.tgz"
              if [ ! -f "$expected" ]; then
                echo "  Updating $dir: need ${dep_name}-${dep_version}.tgz"
                rm -f "$dir/charts/"*.tgz
                helm dependency update "$dir"
                updated=true
              fi
            done

            if [ "$updated" = true ]; then
              git config user.name "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"
              git add -A
              if ! git diff --cached --quiet; then
                git commit -m "chore: update helm dependency artifacts"
                git push
                echo "  Pushed update to $branch"
              fi
            else
              echo "  No updates needed"
            fi

            popd
            rm -rf "$tmp"
          done
