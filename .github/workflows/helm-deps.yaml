name: Update Helm Dependencies

on:
  push:
    branches:
      - 'renovate/**'
    paths:
      - 'charts/**/Chart.yaml'

permissions:
  contents: write

jobs:
  update-deps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref }}
          token: ${{ secrets.RENOVATE_TOKEN }}

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Update changed chart dependencies
        run: |
          for chart in $(git diff-tree --no-commit-id --name-only -r HEAD -- 'charts/*/Chart.yaml'); do
            dir=$(dirname "$chart")
            echo "Updating dependencies for $dir"
            rm -f "$dir/charts/"*.tgz
            helm dependency update "$dir"
          done

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 'charts/*/charts/*.tgz' 'charts/*/Chart.lock'
          if git diff --cached --quiet; then
            echo "No dependency changes to commit"
          else
            git commit -m "chore: update helm dependency artifacts"
            git push
          fi
