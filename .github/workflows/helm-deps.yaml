name: Update Helm Dependencies

on:
  pull_request:
    branches:
      - main
    paths:
      - 'charts/**/Chart.yaml'

permissions:
  contents: write

jobs:
  update-deps:
    runs-on: ubuntu-latest
    if: startsWith(github.head_ref, 'renovate/')
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.RENOVATE_TOKEN }}

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Update all chart dependencies
        run: |
          for chart in charts/*/Chart.yaml; do
            dir=$(dirname "$chart")
            if [ -d "$dir/charts" ]; then
              echo "Updating dependencies for $dir"
              rm -f "$dir/charts/"*.tgz
              helm dependency update "$dir"
            fi
          done

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 'charts/*/charts/*.tgz' 'charts/*/Chart.lock'
          if git diff --cached --quiet; then
            echo "No dependency changes to commit"
          else
            git commit -m "chore: update helm dependency artifacts"
            git push
          fi
